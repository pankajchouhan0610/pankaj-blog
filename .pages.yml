media:
  input: static/images
  output: /images

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: content/posts
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, date, draft, tags]
      primary: title
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: description
        label: Description
        type: text
      - name: tags
        label: Tags
        type: string
        list: true
      - name: cover
        label: Cover Image
        type: image
      - name: body
        label: Body
        type: rich-text

  - name: about
    label: About Page
    type: file
    path: content/about.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Body
        type: rich-text